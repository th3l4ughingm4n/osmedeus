kind: flow
name: domain-extensive
description: Exhaustive recon - full port range with DNS bruteforce and permutations
tags: recon, domain, extensive
extends: domain-standard
help:
  example_targets: ['example.com', 'hackerone.com']
  usage: osmedeus run -f domain-extensive -t example.com

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  - name: enableDnsBruteFocing
    default: true
  - name: enablePermutation
    default: true
  - name: enableStoreHTTPResponse
    default: true
  - name: commonHttpsPort
    default: "1-65535"
  - name: commonHttpPorts
    default: "1-65535"
# -----------------------------------------------------------------------------
# DEPENDENCIES SECTION
# -----------------------------------------------------------------------------
dependencies:
  variables:
    - name: Target
      type: domain
      required: true

# -----------------------------------------------------------------------------
# MODULES SECTION
# Execution order with dependencies
# -----------------------------------------------------------------------------
modules:
  # ===========================================================================
  # Phase 1: Subdomain Enumeration
  # ===========================================================================
  - name: enum-subdomain
    path: common/enum-subdomain.yaml

  # ===========================================================================
  # Phase 2: Probing
  # ===========================================================================
  - name: probe-dns
    path: common/probe-dns.yaml
    depends_on:
      - enum-subdomain

  # ===========================================================================
  # Phase 3: Fingerprinting
  # ===========================================================================
  - name: recon-http-fp
    path: common/recon-http-fp.yaml
    depends_on:
      - probe-dns

  # ===========================================================================
  # Phase 4: Screenshots
  # ===========================================================================
  - name: recon-screenshot
    path: common/recon-screenshot.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 5: Spidering
  # ===========================================================================
  - name: recon-spider
    path: common/recon-spider.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 6: Archiving
  # ===========================================================================
  - name: util-archive
    path: common/util-archive.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 7: IP Space Enumeration
  # ===========================================================================
  - name: enum-ipspace
    path: common/enum-ipspace.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 8: Vulnerability Scanning
  # ===========================================================================
  - name: scan-vuln
    path: common/scan-vuln.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 9: Port Scanning
  # ===========================================================================
  - name: probe-port
    path: common/probe-port.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 10: Thorough Vulnerability Scanning with Vigolium
  # ===========================================================================
  - name: scan-vuln-thorough
    path: common/scan-vuln-thorough.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 11: Archive URL Discovery → Vuln Scan Pipeline
  # Discovers historical URLs via gau & feeds through httpx → nuclei
  # Picks up endpoints that active crawling misses
  # ===========================================================================
  - name: gau-scan
    path: common/gau-scan.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 12: Wappalyzer Tech Detection (enrichment)
  # ===========================================================================
  - name: recon-wappalyzer
    path: fragments/do-recon-wappalyzer.yaml
    depends_on:
      - recon-http-fp
